          - paragraph [ref=e130]:
            - strong [ref=e131]: "What this enables today:"
            - text: I can provision a complete infrastructure stack — services, networking, storage, observability, CI/CD — for a small or medium business in a fraction of the time it would have taken before. The platform is not a hobby list. It’s a repeatable, documented system.
          - heading "What I’d Do Differently" [level=2] [ref=e132]
          - list [ref=e133]:
            - listitem [ref=e134]: Start with GitOps from day one, even for a single node. The discipline of “no manual changes to the cluster” is easier to build than to retrofit.
            - listitem [ref=e135]: Define SLOs earlier. “It’s working” is not a reliability target. Defining what “working” means (latency, availability, error rate) changes how you build and monitor.
            - listitem [ref=e136]: Document incidents from the start. Every time something broke and I fixed it was a postmortem that never got written. That institutional knowledge lives only in memory.
