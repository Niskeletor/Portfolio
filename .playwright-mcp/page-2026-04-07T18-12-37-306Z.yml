        - paragraph [ref=e18]: April 7, 2026
        - 'heading "From Manual Chaos to GitOps: Building a Production-like Platform at Home" [level=1] [ref=e19]'
        - paragraph [ref=e20]: How I evolved from a Raspberry Pi with systemd services to a 3-node Proxmox cluster running K3s, ArgoCD and GitOps — and what I learned operating real systems under real constraints.
        - generic [ref=e21]:
