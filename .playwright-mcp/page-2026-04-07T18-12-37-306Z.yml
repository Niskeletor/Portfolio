        - generic [ref=e42]:
          - heading "Context" [level=2] [ref=e43]
          - paragraph [ref=e44]: This isn’t a tutorial. It’s the story of how a personal platform evolved over several years — from a Raspberry Pi on a desk to a 3-node Proxmox cluster running Kubernetes, GitOps and production-grade observability.
          - paragraph [ref=e45]: "The constraint that made it real: personal time, zero budget, and the goal of operating systems that actually work. Not a lab you turn on once and forget — a platform you depend on."
          - 'heading "Before: The Manual Era" [level=2] [ref=e46]'
          - paragraph [ref=e47]:
            - text: "It started with a Raspberry Pi and curiosity about low-power computing. Then a decommissioned office PC — an i3 with 8GB RAM running Debian — became the first “server”. Nextcloud, systemd services, and the classic discovery: every"
            - code [ref=e48]: apt upgrade
            - text: was a potential incident.
          - paragraph [ref=e49]:
            - text: When things broke, reinstalling from scratch was the easy way out. Instead, I learned to read
            - code [ref=e50]: journalctl
            - text: logs, dig into service logs, and cross-reference changelogs. Each broken service was a puzzle. That mindset shift — from “consumer of services” to “engineer who understands the system” — is where this story really starts.
          - paragraph [ref=e51]:
            - strong [ref=e52]: Docker changed everything.
            - text: "Not through the CLI at first, but through Portainer — a visual interface that made containers, stacks, networks and volumes tangible. The key insight: updating the OS no longer meant breaking the services. That was the first “explosion” in my mental model."
          - paragraph [ref=e53]: "The workflow at that point:"
          - list [ref=e54]:
            - listitem [ref=e55]: Browse Docker Hub or LinuxServer.io for images
            - listitem [ref=e56]: Paste a compose template into Portainer
            - listitem [ref=e57]: Manually edit files inside the Portainer UI to update
            - listitem [ref=e58]:
              - text: Directories in
              - code [ref=e59]: ~/services/<service-name>/
              - text: as the only “source of truth”
          - paragraph [ref=e60]:
            - strong [ref=e61]: "The problem with that approach:"
            - text: "no version control, no history, no way to recover a broken configuration except memory. If a directory disappeared, the service configuration was gone. Watchtower helped automate container updates, but it didn’t solve the root issue: the state of the system lived in a machine, not in a repository."
          - heading "The Constraint That Drove Change" [level=2] [ref=e62]
          - paragraph [ref=e63]: "Two problems that the Docker-on-a-single-machine approach couldn’t solve:"
          - list [ref=e64]:
            - listitem [ref=e65]:
              - strong [ref=e66]: No HA.
              - text: If I wanted to upgrade hardware, all services went down. There was no way to migrate workloads without downtime.
            - listitem [ref=e67]:
              - strong [ref=e68]: No agility.
              - text: Testing a configuration change meant editing live files. Rollback meant remembering what you changed.
          - paragraph [ref=e69]: "I needed something that could run services across multiple nodes and replace containers without interruption. That led me to Kubernetes — specifically to the zero-downtime rolling deployment model: a new container isn’t started until the new version is confirmed healthy, and the old one isn’t removed until the new one is running."
          - 'heading "The Solution: K3s + ArgoCD + GitOps" [level=2] [ref=e70]'
          - paragraph [ref=e71]: "The path to the current architecture wasn’t linear. I rebuilt the cluster multiple times. Each iteration taught me something the previous one didn’t:"
          - list [ref=e72]:
            - listitem [ref=e73]:
              - strong [ref=e74]: First attempts with Rancher
              - text: as a management layer — good for understanding Kubernetes concepts visually, similar to how Portainer helped with Docker
            - listitem [ref=e75]:
              - strong [ref=e76]: Helm and Bitnami charts
              - text: made initial deployments easier, but customising them to real needs required understanding the underlying manifests
            - listitem [ref=e77]:
              - strong [ref=e78]: Storage was the hard problem.
              - text: TrueNAS as NFS backend via the CSI driver works well for app configs and stateless workloads. For databases, mechanical disks over NFS introduced latency that broke things. That’s when Longhorn became part of the stack — distributed block storage that runs inside the cluster itself
          - paragraph [ref=e79]:
            - strong [ref=e80]: The GitOps turning point came from work, not from the homelab.
          - paragraph [ref=e81]:
            - text: At a previous role, the team was managing an AKS cluster by running
            - code [ref=e82]: kubectl apply
            - text: manually and making live edits through OpenLens. I was given the task of researching a better shared workflow. That’s when I studied ArgoCD properly.
          - paragraph [ref=e83]: ArgoCD listens for changes in a Git repository and automatically reconciles the cluster state to match. No more manual apply. No more “who changed this and when?”. Git becomes the single source of truth — with full history, diff visibility, and the ability to roll back by reverting a commit.
          - paragraph [ref=e84]: "The additional insight: for team members less comfortable with the terminal, ArgoCD provided a visual interface to see exactly what was deployed, what was syncing, and what the diff was against the desired state. Infrastructure became legible to everyone."
          - paragraph [ref=e85]: That understanding came directly back to the personal platform.
          - heading "Current Architecture" [level=2] [ref=e86]
          - code [ref=e88]:
            - generic [ref=e89]: GitHub/Gitea (source of truth)
            - generic [ref=e90]: ↓ push
            - generic [ref=e91]: ArgoCD (reconciliation loop, auto-sync)
            - generic [ref=e92]: ↓ applies manifests
            - generic [ref=e93]: "K3s cluster (3 Proxmox nodes: Andromeda, Triangulum, Orion)"
            - generic [ref=e94]: ├── TrueNAS NFS → app configs, media, backups (CSI driver)
            - generic [ref=e95]: ├── Longhorn → database persistent volumes
            - generic [ref=e96]: ├── VictoriaMetrics + Grafana → metrics and dashboards
            - generic [ref=e97]: └── Traefik → ingress with TLS
          - paragraph [ref=e98]:
            - strong [ref=e99]: "The golden path for a new service today:"
          - list [ref=e100]:
            - listitem [ref=e101]: Create a manifest in the GitOps repo
            - listitem [ref=e102]: Push to main
            - listitem [ref=e103]: ArgoCD detects the change and syncs within minutes
            - listitem [ref=e104]: Service is live, monitored, and version-controlled
          - paragraph [ref=e105]:
            - text: No SSH into a node. No
            - code [ref=e106]: kubectl apply -f
            - text: . No Portainer editor. A file change in Git is the entire deployment operation.
