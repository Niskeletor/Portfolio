        - paragraph [ref=e57]: I'm a DevOps Architect and SRE based in A Coruña, Spain, with 6+ years operating, automating and improving Linux infrastructure. I currently work at Allenta Consulting on high-availability systems, observability pipelines and automation with Ansible.
