            - heading "Architecture" [level=3] [ref=e299]
          - paragraph [ref=e300]: "3 Proxmox nodes (Andromeda, Triangulum, Orion), K3s cluster with ArgoCD GitOps, TrueNAS storage, Pi-hole DNS. Every service follows a golden path: repo template → CI/CD pipeline → GitOps deploy → SLO dashboard → alerting."
        - generic [ref=e301]:
          - generic [ref=e302]:
            - generic [ref=e303]: 📈
            - heading "Delivery Metrics" [level=3] [ref=e304]
          - paragraph [ref=e305]: "Real DORA-style metrics tracked via GitOps commit history: multiple deployments per week, commit-to-deploy lead time under 5 minutes via ArgoCD reconciliation, change fail rate tracked per incident log."
        - generic [ref=e306]:
          - generic [ref=e307]:
            - generic [ref=e308]: 🔍
            - heading "Observability" [level=3] [ref=e309]
          - paragraph [ref=e310]: VictoriaMetrics + Grafana for metrics and dashboards. Zabbix for host-level monitoring. Alert routing configured for actionable notifications — not noise. Dashboards cover resource saturation, service health and storage capacity.
        - generic [ref=e311]:
          - generic [ref=e312]:
            - generic [ref=e313]: ⚡
            - heading "Toil Reduction" [level=3] [ref=e314]
          - paragraph [ref=e315]: Ansible playbooks handle system updates, service configuration and new node provisioning. Manual operations that were weekly routines are now automated runs. GitOps reconciliation eliminates manual kubectl apply.
        - generic [ref=e316]:
          - generic [ref=e317]:
            - generic [ref=e318]: 🛡️
            - heading "Security & Reliability" [level=3] [ref=e319]
          - paragraph [ref=e320]: Network segmentation, secrets managed with Vaultwarden, Tailscale for remote access, Cloudflare tunnels for public services. TLS everywhere. Regular backup verification.
